<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Linguistic Help</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body { font-family: 'Be Vietnam Pro', sans-serif; background:#f7f5ff; }
.font-headline { font-family: 'Plus Jakarta Sans'; }
</style>
</head>

<body class="min-h-screen pb-32">

<!-- HEADER -->
<header class="fixed top-0 w-full bg-white shadow p-4 flex justify-between">
  <h1 class="text-xl font-bold text-blue-600">Linguistic Help</h1>
  <span>🇮🇹 ↔ 🇬🇧</span>
</header>

<main class="pt-24 px-6 space-y-8">

<!-- MIC -->
<section class="flex flex-col items-center space-y-4">
  <button id="micBtn" class="w-32 h-32 bg-blue-600 text-white rounded-full text-3xl">
    🎤
  </button>
  <p class="text-gray-500">Tap to speak Italian</p>
</section>

<!-- OUTPUT -->
<section class="bg-white p-6 rounded-xl shadow space-y-4">

  <div>
    <h3 class="text-xs text-gray-400">Original</h3>
    <p id="originalText" class="text-xl font-bold">...</p>
  </div>

  <div>
    <h3 class="text-xs text-gray-400">Translation</h3>
    <p id="translatedText" class="text-lg italic text-gray-600">...</p>
  </div>

</section>

<!-- SUGGESTIONS -->
<section>
  <h3 class="font-bold mb-2">Suggested Replies</h3>
  <div id="suggestions" class="flex gap-2 overflow-x-auto"></div>
</section>

<!-- INPUT -->
<section class="space-y-2">
  <input id="replyInput" class="w-full p-3 border rounded" placeholder="Type reply..." />
  <button id="sendBtn" class="w-full bg-green-600 text-white p-3 rounded">
    Translate & Speak
  </button>
</section>

</main>

<script>
const API_URL = "YOUR_SUPABASE_FUNCTION_URL";

// Speech Recognition
const recognition = new webkitSpeechRecognition();
recognition.lang = "it-IT";

document.getElementById("micBtn").onclick = () => {
  recognition.start();
};

recognition.onresult = async (event) => {
  const text = event.results[0][0].transcript;

  document.getElementById("originalText").innerText = text;

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  document.getElementById("translatedText").innerText = data.translation;

  showSuggestions(data.suggestions);
};

// Show suggestions
function showSuggestions(text) {
  const container = document.getElementById("suggestions");
  container.innerHTML = "";

  const lines = text.split("\n");

  lines.forEach(line => {
    if (line.trim()) {
      const btn = document.createElement("button");

      btn.innerText = line;
      btn.className = "bg-blue-100 px-3 py-2 rounded text-sm whitespace-nowrap";

      btn.onclick = () => handleReply(line);

      container.appendChild(btn);
    }
  });
}

// Handle reply
async function handleReply(text) {
  document.getElementById("replyInput").value = text;
  translateAndSpeak(text);
}

// Manual send
document.getElementById("sendBtn").onclick = () => {
  const text = document.getElementById("replyInput").value;
  translateAndSpeak(text);
};

// Translate + Speak Italian
async function translateAndSpeak(text) {
  const res = await fetch("https://libretranslate.de/translate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      q: text,
      source: "en",
      target: "it"
    })
  });

  const data = await res.json();

  speakItalian(data.translatedText);
}

// Text-to-speech
function speakItalian(text) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "it-IT";
  speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
