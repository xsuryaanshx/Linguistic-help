<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linguistic Help</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial; background:#f3f4f6; }

.listening {
  animation: pulse 1s infinite;
  background-color: #ef4444 !important;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
</style>
</head>

<body class="flex flex-col items-center p-6 min-h-screen">

<!-- HEADER -->
<div class="w-full max-w-xl flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold text-blue-600">Linguistic Help</h1>
  <span>🇮🇹 ↔ 🇬🇧</span>
</div>

<!-- MIC -->
<div class="flex flex-col items-center gap-4 mb-6">
  <button id="micBtn" class="w-32 h-32 bg-blue-600 text-white rounded-full text-4xl shadow-lg transition-all">
    🎤
  </button>
  <p id="statusText" class="text-gray-500">Tap to speak Italian</p>
</div>

<!-- OUTPUT -->
<div class="bg-white p-6 rounded-xl shadow w-full max-w-xl space-y-4 mb-6">

  <div>
    <p class="text-sm text-gray-400">Original</p>
    <p id="originalText" class="text-xl font-bold">...</p>
  </div>

  <div>
    <p class="text-sm text-gray-400">Translation</p>
    <p id="translatedText" class="text-lg italic text-gray-600">...</p>
  </div>

</div>

<!-- SUGGESTIONS -->
<div class="w-full max-w-xl mb-6">
  <h3 class="font-bold mb-2">Suggested Replies</h3>
  <div id="suggestions" class="flex gap-2 overflow-x-auto"></div>
</div>

<!-- INPUT -->
<div class="w-full max-w-xl space-y-2">
  <input id="replyInput" class="w-full p-3 border rounded" placeholder="Type reply in English..." />
  <button id="sendBtn" class="w-full bg-green-600 text-white p-3 rounded hover:bg-green-700">
    Translate & Speak
  </button>
</div>

<script>
const API_URL = "https://owbievgoqyuaxlkatuaa.supabase.co/functions/v1/translate-assistant";

const micBtn = document.getElementById("micBtn");
const statusText = document.getElementById("statusText");

// 🎤 Speech Recognition
const recognition = new webkitSpeechRecognition();
recognition.lang = "it-IT";

micBtn.onclick = () => {
  micBtn.classList.add("listening");
  statusText.innerText = "Listening...";
  recognition.start();
};

recognition.onend = () => {
  micBtn.classList.remove("listening");
  statusText.innerText = "Tap to speak Italian";
};

recognition.onresult = async (event) => {
  const text = event.results[0][0].transcript;
  handleIncomingSpeech(text);
};

// 🧠 HANDLE ITALIAN INPUT
async function handleIncomingSpeech(text) {
  document.getElementById("originalText").innerText = text;
  document.getElementById("translatedText").innerText = "Translating...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    document.getElementById("translatedText").innerText = data.translation;
    showSuggestions(data.suggestions);

  } catch (err) {
    document.getElementById("translatedText").innerText = "API error";
    console.error(err);
  }
}

// 💡 SUGGESTIONS
function showSuggestions(text) {
  const container = document.getElementById("suggestions");
  container.innerHTML = "";

  text.split("\n").forEach(line => {
    if (line.trim()) {
      const btn = document.createElement("button");
      btn.innerText = line;
      btn.className = "bg-blue-100 px-3 py-2 rounded text-sm whitespace-nowrap hover:bg-blue-200";
      btn.onclick = () => handleReply(line);
      container.appendChild(btn);
    }
  });
}

// ✍️ CLICK SUGGESTION
function handleReply(text) {
  document.getElementById("replyInput").value = text;
  handleUserReply(text);
}

// 🟢 BUTTON CLICK FIXED HERE
document.getElementById("sendBtn").onclick = () => {
  const text = document.getElementById("replyInput").value;
  if (!text) return;
  handleUserReply(text);
};

// 🔁 HANDLE USER REPLY (THIS WAS MISSING)
async function handleUserReply(text) {
  document.getElementById("originalText").innerText = text;
  document.getElementById("translatedText").innerText = "Translating...";

  try {
    const res = await fetch("https://translate.argosopentech.com/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        q: text,
        source: "en",
        target: "it"
      })
    });

    const data = await res.json();

    document.getElementById("translatedText").innerText = data.translatedText;

    speakItalian(data.translatedText);

  } catch (err) {
    document.getElementById("translatedText").innerText = "Error translating";
  }
}

// 🔊 SPEAK
function speakItalian(text) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "it-IT";
  speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
