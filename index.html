<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL = "https://owbievgoqyuaxlkatuaa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YmlldmdvcXl1YXhsa2F0dWFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzUyOTIsImV4cCI6MjA5MDExMTI5Mn0.3xDXziXLRG6vmtfKmZ8KuHgM6mCh6RK4PYsj2HZWks0"; // ⚠️ replace
const EDGE_FN = `${SUPABASE_URL}/functions/v1/translate-assistant`;

// ── FIXED TRANSLATE FUNCTION ────────────────────────────────────
async function translate(text, srcCode, tgtCode) {
  try {
    const res = await fetch(EDGE_FN, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, // ✅ FIX
        "apikey": SUPABASE_ANON_KEY                    // ✅ FIX
      },
      body: JSON.stringify({
        text: text,
        source_lang: srcCode,
        target_lang: tgtCode
      })
    });

    const data = await res.json();

    if (!res.ok) {
      console.error("API ERROR:", data);
      return "[Translation failed]";
    }

    return data.translation || "[No translation]";
  } catch (err) {
    console.error("FETCH ERROR:", err);
    return "[Network error]";
  }
}

// ── TTS ─────────────────────────────────────────────────────────
function speakOut(text, lang) {
  if (!text || text.startsWith("[")) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = 0.95;
  speechSynthesis.speak(u);
}

// ── SEND TYPED MESSAGE ──────────────────────────────────────────
async function sendTyped() {
  const input = document.getElementById("typeInput");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  const outputOriginal = document.querySelector(".msg-original");
  const outputTranslation = document.querySelector(".msg-translation");

  outputOriginal.textContent = text;
  outputTranslation.textContent = "Translating...";

  const src = document.getElementById("myLang").selectedOptions[0].dataset.code;
  const tgt = document.getElementById("theirLang").selectedOptions[0].dataset.code;

  const result = await translate(text, src, tgt);

  outputTranslation.textContent = result;

  speakOut(result, document.getElementById("theirLang").value);
}

// ── BUTTON EVENTS ───────────────────────────────────────────────
document.getElementById("typeSend").onclick = sendTyped;
document.getElementById("typeInput").addEventListener("keydown", e => {
  if (e.key === "Enter") sendTyped();
});

// ── BASIC MIC (optional keep simple) ─────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SR) {
  const recog = new SR();
  recog.lang = "it-IT";

  document.getElementById("meBtn").onclick = () => {
    recog.start();
  };

  recog.onresult = async (e) => {
    const text = e.results[0][0].transcript;

    const outputOriginal = document.querySelector(".msg-original");
    const outputTranslation = document.querySelector(".msg-translation");

    outputOriginal.textContent = text;
    outputTranslation.textContent = "Translating...";

    const result = await translate(text, "it", "en");

    outputTranslation.textContent = result;
    speakOut(result, "en-US");
  };
}
</script>
