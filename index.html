<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linguistic Help</title>
<style>
body { font-family: Arial; background:#0b0f14; color:white; text-align:center; }
button { padding:10px 20px; margin:10px; border:none; border-radius:10px; cursor:pointer; }
#mic { background:#4d9eff; color:white; border-radius:50%; width:120px; height:120px; font-size:40px; }
.card { background:#111; padding:20px; margin:20px; border-radius:12px; }
</style>
</head>

<body>

<h1>Linguistic Help</h1>

<select id="source">
  <option>Italian</option>
  <option>English</option>
  <option>Spanish</option>
  <option>French</option>
</select>

<select id="target">
  <option>English</option>
  <option>Italian</option>
  <option>Spanish</option>
  <option>French</option>
</select>

<br><br>

<button id="mic">🎤</button>

<div class="card">
  <h3>Original</h3>
  <p id="original">...</p>

  <h3>Translation</h3>
  <p id="translation">...</p>
</div>

<input id="input" placeholder="Type here..." />
<button onclick="sendText()">Translate</button>

<script>

// ✅ YOUR SUPABASE FUNCTION
const API = "https://owbievgoqyuaxlkatuaa.supabase.co/functions/v1/translate-assistant";

// ✅ TRANSLATE FUNCTION (FIXED)
async function translate(text, source, target) {
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text: text,
        source_lang: source,
        target_lang: target
      })
    });

    const data = await res.json();
    console.log("API response:", data);

    return data.translation || "[Error]";
  } catch (err) {
    console.error(err);
    return "[API error]";
  }
}

// 🎤 SPEECH RECOGNITION
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recog;

if (SpeechRecognition) {
  recog = new SpeechRecognition();
  recog.continuous = false;
  recog.interimResults = false;

  document.getElementById("mic").onclick = () => {
    recog.lang = document.getElementById("source").value;
    recog.start();
  };

  recog.onresult = async (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById("original").innerText = text;

    const translation = await translate(
      text,
      document.getElementById("source").value,
      document.getElementById("target").value
    );

    document.getElementById("translation").innerText = translation;

    speak(translation);
  };
}

// 🗣️ TEXT INPUT
async function sendText() {
  const text = document.getElementById("input").value;
  document.getElementById("original").innerText = text;

  const translation = await translate(
    text,
    document.getElementById("source").value,
    document.getElementById("target").value
  );

  document.getElementById("translation").innerText = translation;
  speak(translation);
}

// 🔊 TEXT TO SPEECH
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = document.getElementById("target").value;
  speechSynthesis.speak(u);
}

</script>

</body>
</html>
